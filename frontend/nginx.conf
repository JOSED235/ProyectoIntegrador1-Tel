server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy inverso hacia el backend FastAPI ────────────────────────────────
    # El frontend llama a /api/... y Nginx lo reenvía a http://api:8001/...
    # Así nunca hay una URL hardcodeada con localhost en el JavaScript compilado.
    location /api/ {
        proxy_pass         http://api:8001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── SPA: todos los paths caen en index.html ───────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache de assets estáticos ─────────────────────────────────────────────
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
